<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポータルサイト（β版）</title>
    <style>
        html { scroll-behavior: smooth; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, sans-serif; }

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            background-size: cover;
            background-attachment: fixed;
        }

        /* 時計エリア */
        .portal-header { text-align: center; margin-bottom: 40px; width: 100%; max-width: 1200px; }
        .time { font-size: 4.5rem; font-weight: bold; color: #ffffff; display: flex; justify-content: center; gap: 2px; }
        .digit-container { display: inline-block; height: 5rem; overflow: hidden; position: relative; width: 2.8rem; text-align: center; }
        .digit-strip { position: absolute; top: 0; left: 0; width: 100%; transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; }
        .digit-strip span { display: inline-block; height: 5rem; line-height: 5rem; }
        .time-colon { display: inline-block; line-height: 4.6rem; width: 1.5rem; text-align: center; font-size: 3rem; color: #38bdf8; }
        .date { font-size: 1.2rem; color: #cbd5e1; margin-top: 10px; }

        /* 拡大検索バー */
        .search-container { width: 100%; max-width: 720px; margin: 0 auto 30px auto; }
        .search-form {
            display: flex; align-items: center; background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(20px); border: 2px solid #38bdf8;
            border-radius: 60px; padding: 0 10px 0 24px; height: 60px;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
        }
        .search-select { background: transparent; color: #38bdf8; border: none; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
        .search-input { flex: 1; background: transparent; border: none; outline: none; color: white; font-size: 1.3rem; padding: 10px; margin-left: 10px; }
        .search-submit-btn { background: #38bdf8; color: #0f172a; border: none; border-radius: 50%; width: 48px; height: 48px; cursor: pointer; font-size: 1.5rem; }

        /* グリッドレイアウト */
        .dashboard-grid { display: grid; grid-template-columns: 1.4fr 0.6fr; gap: 25px; width: 100%; max-width: 1250px; }
        .card { background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 25px; margin-bottom: 20px; }
        .shortcut-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .shortcut-item { display: flex; align-items: center; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 10px; color: white; text-decoration: none; transition: 0.2s; }
        .shortcut-item:hover { background: rgba(56, 189, 248, 0.2); }
    </style>
</head>
<body>

    <div class="portal-header">
        <div class="time" id="clock">
            <span class="digit-container"><span class="digit-strip" id="h1"><span>012</span></span></span>
            <span class="digit-container"><span class="digit-strip" id="h2"><span>0123456789</span></span></span>
            <span class="time-colon">:</span>
            <span class="digit-container"><span class="digit-strip" id="m1"><span>012345</span></span></span>
            <span class="digit-container"><span class="digit-strip" id="m2"><span>0123456789</span></span></span>
            <span class="time-colon">:</span>
            <span class="digit-container"><span class="digit-strip" id="s1"><span>012345</span></span></span>
            <span class="digit-container"><span class="digit-strip" id="s2"><span>0123456789</span></span></span>
        </div>
        <div class="date" id="date"></div>

        <div class="search-container">
            <form id="searchForm" action="https://www.google.com/search" method="get" target="_blank" class="search-form">
                <select id="engine" class="search-select" onchange="updateEngine()">
                    <option value="google">Google</option>
                    <option value="yahoo">Yahoo!</option>
                </select>
                <input type="text" name="q" id="query" class="search-input" placeholder="検索キーワードを入力" required>
                <button type="submit" class="search-submit-btn">➔</button>
            </form>
        </div>
    </div>

    <div class="dashboard-grid">
        <div id="content">
            <div class="card">
                <div class="shortcut-list" id="links"></div>
            </div>
        </div>
    </div>

    <script>
        // 1. 時計ロジック
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            
            const setDigit = (id, val) => document.getElementById(id).style.transform = `translateY(-${val * 5}rem)`;
            setDigit('h1', h[0]); setDigit('h2', h[1]);
            setDigit('m1', m[0]); setDigit('m2', m[1]);
            setDigit('s1', s[0]); setDigit('s2', s[1]);
            
            document.getElementById('date').textContent = now.toLocaleDateString('ja-JP', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 2. 検索エンジン切替
        function updateEngine() {
            const engine = document.getElementById('engine').value;
            const form = document.getElementById('searchForm');
            const query = document.getElementById('query');
            if(engine === 'yahoo') {
                form.action = "https://search.yahoo.co.jp/search";
                query.name = "p";
            } else {
                form.action = "https://www.google.com/search";
                query.name = "q";
            }
        }

        // 3. リンク表示
        const links = [{n:'Google', u:'https://google.com'}, {n:'YouTube', u:'https://youtube.com'}];
        const linkContainer = document.getElementById('links');
        links.forEach(l => {
            linkContainer.innerHTML += `<a href="${l.u}" class="shortcut-item" target="_blank">${l.n}</a>`;
        });
    </script>
</body>
</html>
