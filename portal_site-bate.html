<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポータルサイト（β版）</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            /* 初期値（画像未設定時）のグラデーション */
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 40px 20px;
            /* 背景画像の共通設定 */
            background-repeat: no-repeat;
            background-position: center center;
            background-attachment: fixed;
            background-size: cover;
            transition: background 0.5s ease; /* 背景切り替えをなめらかに */
        }

        /* ヘッダーエリア */
        .portal-header {
            text-align: center;
            margin-bottom: 40px;
            text-shadow: 0 4px 12px rgba(0, 0, 0, 0.7);
            position: relative;
            width: 100%;
            max-width: 1200px;
        }

        .portal-badge {
            display: inline-block;
            background: #ef4444;
            color: #ffffff;
            font-size: 0.85rem;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 20px;
            margin-bottom: 12px;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(239, 68, 68, 0.4);
        }

        .portal-title {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: 2px;
            color: #ffffff;
            margin-bottom: 25px;
        }

        /* 時計エリア */
        .clock-container {
            text-align: center;
            margin-bottom: 10px;
        }

        .time {
            font-size: 4rem;
            font-weight: bold;
            letter-spacing: 2px;
            color: #ffffff;
        }

        .date {
            font-size: 1.2rem;
            color: #cbd5e1;
            margin-top: 5px;
        }

        /* メイングリッド (3カラム構成にしてライフ情報を追加) */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1.1fr 0.9fr 1fr;
            gap: 25px;
            width: 100%;
            max-width: 1400px;
        }

        /* 各カードの共通スタイル（すりガラス効果） */
        .card {
            background: rgba(15, 23, 42, 0.5); 
            backdrop-filter: blur(16px);       
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 22px;
            height: fit-content;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            margin-bottom: 25px;
        }

        .card h2 {
            font-size: 1.25rem;
            margin-bottom: 18px;
            color: #38bdf8;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* カテゴリーを個別の枠（カード）にするためのクラス */
        .category-card {
            background: rgba(15, 23, 42, 0.5); 
            backdrop-filter: blur(16px);       
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 22px;
            height: fit-content;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            margin-bottom: 25px;
        }

        .category-card-header {
            font-size: 1.25rem;
            font-weight: bold;
            color: #38bdf8;
            margin-bottom: 18px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* 管理用ヘッダーカード（常に一番下に配置） */
        .admin-card {
            background: rgba(15, 23, 42, 0.35);
            border: 1px dashed rgba(255, 255, 255, 0.15);
            margin-top: 10px;
        }

        /* 各種ボタン */
        .edit-btn, .todo-add-btn {
            background: #38bdf8;
            color: #0f172a;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            font-weight: bold;
            border: none;
            transition: 0.2s;
        }

        .edit-btn:hover, .todo-add-btn:hover {
            background: #0ea5e9;
        }

        .category-del-btn {
            display: none;
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: bold;
        }

        /* リンク（ショートカット） */
        .shortcut-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .shortcut-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        .shortcut-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.07);
            border-radius: 8px;
            color: #fff;
            text-decoration: none;
            transition: 0.2s;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 0.95rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
        }

        .shortcut-item:hover {
            background: rgba(56, 189, 248, 0.25);
            transform: translateY(-2px);
        }

        .shortcut-icon {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            object-fit: contain;
        }

        /* 削除ボタン */
        .delete-link-btn {
            display: none;
            position: absolute;
            right: 10px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            line-height: 20px;
            text-align: center;
        }

        /* TODO リストスタイル */
        .todo-input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        .todo-input-group input {
            flex: 1;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(15, 23, 42, 0.6);
            color: white;
            outline: none;
            font-size: 0.9rem;
        }

        .todo-list {
            list-style: none;
            max-height: 220px;
            overflow-y: auto;
        }

        .todo-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            margin-bottom: 8px;
            font-size: 0.95rem;
            transition: 0.2s;
        }

        .todo-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .todo-check-btn {
            background: none;
            border: 1px solid #10b981;
            color: #10b981;
            border-radius: 4px;
            padding: 2px 8px;
            font-size: 0.75rem;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .todo-check-btn:hover {
            background: #10b981;
            color: #0f172a;
        }

        /* ライフ（天気・ニュース）スタイル */
        .weather-panel {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid rgba(56, 189, 248, 0.2);
            padding: 14px;
            border-radius: 10px;
            margin-bottom: 15px;
            text-decoration: none;
            color: white;
            transition: 0.2s;
        }

        .weather-panel:hover {
            background: rgba(56, 189, 248, 0.2);
            transform: translateY(-2px);
        }

        .weather-icon {
            font-size: 2.2rem;
        }

        .weather-info {
            line-height: 1.4;
        }

        .news-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .news-item {
            display: block;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            color: #e2e8f0;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.2s;
            border-left: 3px solid #38bdf8;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .news-item:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            transform: translateX(4px);
        }

        /* 編集フォーム */
        .edit-form {
            display: none;
            margin-top: 20px;
            padding: 18px;
            background: rgba(15, 23, 42, 0.95);
            border-radius: 10px;
            border: 1px dashed rgba(255, 255, 255, 0.2);
            flex-direction: column;
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 0.95rem;
            color: #38bdf8;
            font-weight: bold;
        }

        .edit-form input, .edit-form select {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #38bdf8;
            background: #1e293b;
            color: #ffffff;
            font-size: 0.95rem;
            outline: none;
        }

        .edit-form select option {
            background: #1e293b;
            color: #ffffff;
        }

        /* トレンドリンクスタイル */
        .trend-card-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            color: #fff;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: bold;
            transition: 0.2s;
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
        }

        .trend-card-link:hover {
            background: rgba(56, 189, 248, 0.25);
            transform: translateY(-2px);
        }

        /* マーケットテーブルとミニグラフ */
        .market-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 5px;
        }

        .market-table th, .market-table td {
            padding: 10px 4px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            vertical-align: middle;
        }

        .market-table th {
            color: #94a3b8;
            font-weight: bold;
            font-size: 0.8rem;
        }

        .market-table td {
            font-size: 0.9rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
        }

        /* クリック可能な行のホバースタイル */
        .clickable-row {
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        .clickable-row:hover {
            background-color: rgba(255, 255, 255, 0.08);
        }

        .clickable-row:active {
            transform: scale(0.99);
        }

        .market-sparkline {
            width: 60px;
            height: 20px;
            vertical-align: middle;
        }

        .price-down {
            color: #ef4444; /* 下落（赤）*/
            font-weight: bold;
        }

        .price-up {
            color: #10b981; /* 上昇（緑）*/
            font-weight: bold;
        }

        .market-date {
            font-size: 0.75rem;
            color: #94a3b8;
            text-align: right;
            margin-top: 12px;
        }

        /* レスポンシブ対応 */
        @media (max-width: 1024px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="portal-header">
        <span class="portal-badge">PORTAL SYSTEM β</span>
        <h1 class="portal-title">総合マイポータル</h1>
        
        <div class="clock-container">
            <div class="time" id="clock">00:00:00</div>
            <div class="date" id="date">2026年1月1日 (木)</div>
        </div>
    </div>

    <div class="dashboard-grid">
        
        <div class="left-column">
            
            <div id="categoriesContainer">
                </div>

            <div class="card admin-card" style="padding: 15px 20px;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span style="font-weight: bold; color: #94a3b8; font-size: 0.9rem;">🛠 ポータルシステム設定</span>
                    <button onclick="toggleEditMode()" id="editModeBtn" class="edit-btn">編集モード</button>
                </div>

                <div id="editForm" class="edit-form">
                    <div class="form-group" style="margin-bottom:5px; border-bottom:1px dashed rgba(255,255,255,0.2); padding-bottom:15px;">
                        <label>🖼 壁紙画像を変更（画像URLを入力）</label>
                        <div style="display:flex; gap:10px;">
                            <input type="text" id="bgUrlInput" placeholder="https://example.com/image.jpg" style="flex:1;">
                            <button onclick="updateBackground()" class="edit-btn">適用</button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>【1】新しいカテゴリーを追加</label>
                        <div style="display:flex; gap:10px;">
                            <input type="text" id="newCatName" placeholder="例: ニュース" style="flex:1;">
                            <button onclick="addCategory()" class="edit-btn">作成</button>
                        </div>
                    </div>
                    
                    <div class="form-group" style="margin-top:5px; border-top:1px dashed rgba(255,255,255,0.2); padding-top:20px;">
                        <label>【2】サイトを追加</label>
                        <select id="linkCategorySelect">
                            </select>
                        <input type="text" id="linkName" placeholder="サイト名（例: Google）" style="margin-top:8px;">
                        <input type="text" id="linkUrl" placeholder="URL（例: google.com）" style="margin-top:8px;">
                        <button onclick="addLink()" class="edit-btn" style="width: 100%; margin-top:12px;">サイトを登録</button>
                    </div>
                </div>
            </div>

        </div>

        <div class="middle-column">
            <div class="card">
                <h2>✅ 今日のTODO</h2>
                <div class="todo-input-group">
                    <input type="text" id="todoInput" placeholder="タスクを入力して追加..." onkeypress="handleTodoKey(event)">
                    <button class="todo-add-btn" onclick="addTodo()">追加</button>
                </div>
                <ul class="todo-list" id="todoList">
                    </ul>
            </div>
        </div>

        <div class="right-column">
            
            <div class="card">
                <h2>☀️ 本日のライフ情報</h2>
                
                <a href="https://weather.yahoo.co.jp/weather/" target="_blank" class="weather-panel">
                    <span class="weather-icon" id="weatherIcon">☀️</span>
                    <div class="weather-info">
                        <div style="font-weight: bold; font-size: 1rem;">川西市近郊の天気</div>
                        <div style="font-size: 0.85rem; color: #e2e8f0;" id="weatherText">晴れ時々曇り / 降水確率 10%</div>
                        <div style="font-size: 0.85rem; color: #e2e8f0;">気温: <span style="color:#ef4444; font-weight:bold;">28℃</span> / <span style="color:#38bdf8; font-weight:bold;">19℃</span></div>
                    </div>
                </a>

                <div class="news-list" id="newsFeed">
                    </div>
            </div>

            <div class="card">
                <h2>🌐 トレンドキーワード</h2>
                <p style="font-size: 0.85rem; color: #cbd5e1; margin-bottom: 12px; line-height: 1.5;">今、世の中で何が一番検索されているかリアルタイムでチェックします。</p>
                <a href="https://trends.google.co.jp/trends/trendingsearches/daily?geo=JP" target="_blank" class="trend-card-link">
                    📈 Google急上昇ワードを開く
                    <span>➔</span>
                </a>
            </div>

            <div class="card">
                <h2>📈 マーケット情報</h2>
                <table class="market-table">
                    <thead>
                        <tr>
                            <th>指標</th>
                            <th>現在値</th>
                            <th style="width: 70px; text-align: center;">推移</th>
                            <th style="text-align: right; padding-right: 12px;">前日比</th>
                        </tr>
                    </thead>
                    <tbody id="market-table-body">
                        </tbody>
                </table>
                <div class="market-date" id="market-update-time">2026年7月15日 13:00 現在</div>
            </div>

        </div>

    </div>

    <script>
        // 時計の更新機能
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds}`;
            
            const year = now.getFullYear();
            const month = now.getMonth() + 1;
            const date = now.getDate();
            const dayNames = ['日', '月', '火', '水', '木', '金', '土'];
            const day = dayNames[now.getDay()];
            document.getElementById('date').textContent = `${year}年${month}月${date}日 (${day})`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- 朝刊ニュース風デモヘッドライン ---
        const newsDataList = [
            { title: "【速報】次世代AIアシスタントの普及率が日本国内で急増", url: "https://yahoo.co.jp" },
            { title: "【経済】日経平均株価、ハイテク株牽引で好調な動きを維持", url: "https://yahoo.co.jp" },
            { title: "【気象】週末にかけて穏やかな晴天、洗濯日和に", url: "https://yahoo.co.jp" },
            { title: "【ガジェット】新型スマートグラス、薄型軽量化に成功し秋発売か", url: "https://yahoo.co.jp" },
            { title: "【ライフ】朝の「白湯」がもたらす健康効果、改めて注目集まる", url: "https://yahoo.co.jp" },
            { title: "【トレンド】昭和レトロな純喫茶風プリン、Z世代で空前のヒット", url: "https://yahoo.co.jp" }
        ];

        function renderNewsFeed() {
            const feed = document.getElementById('newsFeed');
            feed.innerHTML = '';
            
            // ランダムに3つのヘッドラインを選んで表示
            const shuffled = [...newsDataList].sort(() => 0.5 - Math.random());
            const selected = shuffled.slice(0, 3);

            selected.forEach(news => {
                const a = document.createElement('a');
                a.className = 'news-item';
                a.href = news.url;
                a.target = '_blank';
                a.textContent = news.title;
                feed.appendChild(a);
            });
        }

        // --- マーケットデータ定義＆10秒自動更新処理 ---
        const marketData = {
            nikkei: {
                name: "日経平均",
                baseVal: 68592.06,
                currentVal: 68592.06,

                unit: "円",

        // スパークライン描画ヘルパー
        function drawSparkline(canvasId, dataPoints, strokeColor) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const width = canvas.width;
            const height = canvas.height;

            const dpr = window.devicePixelRatio || 1;
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            ctx.scale(dpr, dpr);

            ctx.clearRect(0, 0, width, height);

            const min = Math.min(...dataPoints);
            const max = Math.max(...dataPoints);
            const range = max - min === 0 ? 1 : max - min;

            ctx.beginPath();
            ctx.lineWidth = 2.5;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = strokeColor;

            dataPoints.forEach((val, i) => {
                const x = (i / (dataPoints.length - 1)) * (width - 4) + 2;
                const y = height - ((val - min) / range) * (height - 6) - 3;
                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            });
            ctx.stroke();

            ctx.lineTo((width - 4) + 2, height);
            ctx.lineTo(2, height);
            ctx.closePath();
            ctx.fillStyle = strokeColor === '#ef4444' ? 'rgba(239, 68, 68, 0.15)' : 'rgba(16, 185, 129, 0.15)';
            ctx.fill();
        }

        // マーケットテーブルのレンダリング＆グラフ再描画
        function renderMarketTable() {
            const tbody = document.getElementById('market-table-body');
            tbody.innerHTML = '';

            Object.keys(marketData).forEach(key => {
                const item = marketData[key];
                const tr = document.createElement('tr');
                tr.className = 'clickable-row';
                tr.onclick = () => window.open(item.link, '_blank');

                const isUp = item.change >= 0;
                const changeClass = isUp ? 'price-up' : 'price-down';
                const prefix = isUp ? '+' : '';
                
                // 表示用数値フォーマット
                const formattedVal = item.currentVal.toLocaleString(undefined, { minimumFractionDigits: item.decimals, maximumFractionDigits: item.decimals });
                const formattedChange = item.change.toLocaleString(undefined, { minimumFractionDigits: item.decimals, maximumFractionDigits: item.decimals });

                tr.innerHTML = `
                    <td><strong>${item.name}</strong></td>
                    <td>${formattedVal}${item.unit}</td>
                    <td style="text-align: center;">
                        <canvas id="canvas-${key}" class="market-sparkline" width="60" height="20"></canvas>
                    </td>
                    <td class="${changeClass}" style="text-align: right; padding-right: 12px;">
                        ${prefix}${formattedChange}${item.unit}
                    </td>
                `;
                tbody.appendChild(tr);

                // ミニグラフ描画
                const strokeColor = isUp ? '#10b981' : '#ef4444';
                drawSparkline(`canvas-${key}`, item.history, strokeColor);
            });

            // 更新タイムスタンプ
            const now = new Date();
            const formatTime = `${now.getFullYear()}年${now.getMonth() + 1}月${now.getDate()}日 ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')} 現在`;
            document.getElementById('market-update-time').textContent = formatTime;
        }

        // 10秒ごとにデータを微変動させてリアルタイム感を出す関数
        function updateMarketData() {
            Object.keys(marketData).forEach(key => {
                const item = marketData[key];
                
                // 変動量調整
                const changePercent = (Math.random() - 0.5) * 0.0002; 
                const delta = item.currentVal * changePercent;

                item.currentVal += delta;
                item.change += delta;

                // グラフデータ履歴の最新値を更新
                item.history[item.history.length - 1] = item.currentVal;
            });
            renderMarketTable();
            renderNewsFeed(); // 一緒にニュースもローテーション
        }


        // --- TODOリスト管理機能 ---
        let todoList = JSON.parse(localStorage.getItem('myPortalTodos')) || [
            "朝のメールチェック",
            "今日のスケジュール確認"
        ];

        function renderTodos() {
            const listEl = document.getElementById('todoList');
            listEl.innerHTML = '';
            todoList.forEach((todo, idx) => {
                const li = document.createElement('li');
                li.className = 'todo-item';
                li.innerHTML = `
                    <span>${todo}</span>
                    <button class="todo-check-btn" onclick="deleteTodo(${idx})">完了</button>
                `;
                listEl.appendChild(li);
            });
        }

        function addTodo() {
            const input = document.getElementById('todoInput');
            const val = input.value.trim();
            if (val) {
                todoList.push(val);
                localStorage.setItem('myPortalTodos', JSON.stringify(todoList));
                input.value = '';
                renderTodos();
            }
        }

        function handleTodoKey(e) {
            if (e.key === 'Enter') {
                addTodo();
            }
        }

        function deleteTodo(idx) {
            todoList.splice(idx, 1);
            localStorage.setItem('myPortalTodos', JSON.stringify(todoList));
            renderTodos();
        }


        // --- カテゴリー＆リンクデータ管理 ---
        const defaultData = {
            "🔍 検索エンジン": [
                { name: "Google", url: "https://www.google.com" },
                { name: "Yahoo! JAPAN", url: "https://www.yahoo.co.jp" },
                { name: "Microsoft Bing", url: "https://www.bing.com" },
                { name: "Perplexity AI", url: "https://www.perplexity.ai" },
                { name: "DuckDuckGo", url: "https://duckduckgo.com" }
            ],
            "🤖 AIツール": [
                { name: "ChatGPT", url: "https://chatgpt.com" },
                { name: "Claude", url: "https://claude.ai" },
                { name: "Gemini", url: "https://gemini.google.com" },
                { name: "DeepL", url: "https://www.deepl.com" }
            ],
            "🛠 業務効率化ツール": [
                { name: "GitHub", url: "https://github.com" },
                { name: "Notion", url: "https://www.notion.so" },
                { name: "Trello", url: "https://trello.com" },
                { name: "Slack", url: "https://slack.com" },
                { name: "Zoom", url: "https://zoom.us" },
                { name: "Google ドライブ", url: "https://drive.google.com" }
            ],
            "📺 エンタメ・SNS": [
                { name: "YouTube", url: "https://www.youtube.com" },
                { name: "X (Twitter)", url: "https://twitter.com" },
                { name: "Instagram", url: "https://www.instagram.com" },
                { name: "TikTok", url: "https://www.tiktok.com" },
                { name: "Twitch", url: "https://www.twitch.tv" },
                { name: "Pinterest", url: "https://www.pinterest.com" },
                { name: "Netflix", url: "https://www.netflix.com" },
                { name: "Amazonプライム", url: "https://www.amazon.co.jp/prime" }
            ]
        };

        let dashboardData = JSON.parse(localStorage.getItem('myCategorizedLinks')) || defaultData;
        let isEditMode = false;

        // デフォルト背景
        const defaultBg = "https://divnil.com/wallpaper/ipad/img/app/m/o/mountains-4k-wallpaper-3840x2160-2048x2048_0b97954feb5ddc0033010b30ba3fd21d_raw.jpg";
        let savedBgUrl = localStorage.getItem('myDashboardBg') || defaultBg;

        function applySavedBackground() {
            if (savedBgUrl) {
                document.body.style.background = `linear-gradient(rgba(15, 23, 42, 0.65), rgba(15, 23, 42, 0.65)), url('${savedBgUrl}') no-repeat center center fixed`;
                document.body.style.backgroundSize = "cover";
                document.getElementById('bgUrlInput').value = savedBgUrl;
            }
        }

        function updateBackground() {
            const input = document.getElementById('bgUrlInput');
            const newUrl = input.value.trim();
            if (newUrl) {
                savedBgUrl = newUrl;
                localStorage.setItem('myDashboardBg', newUrl);
                applySavedBackground();
            } else {
                savedBgUrl = defaultBg;
                localStorage.setItem('myDashboardBg', defaultBg);
                applySavedBackground();
            }
        }

        function renderDashboard() {
            const container = document.getElementById('categoriesContainer');
            const select = document.getElementById('linkCategorySelect');
            
            container.innerHTML = '';
            select.innerHTML = '';

            Object.keys(dashboardData).forEach((catName) => {
                const option = document.createElement('option');
                option.value = catName;
                option.textContent = catName;
                select.appendChild(option);

                // カテゴリーごとに独立した .category-card を作成
                const section = document.createElement('div');
                section.className = 'category-card';

                const header = document.createElement('div');
                header.className = 'category-card-header';
                header.innerHTML = `
                    <span>${catName}</span>
                    <button class="category-del-btn" onclick="deleteCategory('${catName}')">カテゴリー削除</button>
                `;
                section.appendChild(header);

                const list = document.createElement('div');
                list.className = 'shortcut-list';

                dashboardData[catName].forEach((link, index) => {
                    const shortcutContainer = document.createElement('div');
                    shortcutContainer.className = 'shortcut-container';

                    const faviconUrl = `https://www.google.com/s2/favicons?sz=64&domain=${encodeURIComponent(link.url)}`;

                    shortcutContainer.innerHTML = `
                        <a href="${link.url}" target="_blank" class="shortcut-item" id="link-${catName}-${index}">
                            <img src="${faviconUrl}" class="shortcut-icon" alt="" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'%23fff\' stroke-width=\'2\'><circle cx=\'12\' cy=\'12\' r=\'10\'></circle></svg>'">
                            ${link.name}
                        </a>
                        <button class="delete-link-btn" id="del-${catName}-${index}" onclick="deleteLink('${catName}', ${index})">✕</button>
                    `;
                    list.appendChild(shortcutContainer);
                }); section.appendChild(list);
                container.appendChild(section);
            });

            applyEditModeStyles();
        }

        function toggleEditMode() {
            isEditMode = !isEditMode;
            const btn = document.getElementById('editModeBtn');
            const form = document.getElementById('editForm');
            
            if (isEditMode) {
                btn.textContent = "設定を閉じる";
                btn.style.background = "#ef4444";
                btn.style.color = "#fff";
                form.style.display = "flex";
            } else {
                btn.textContent = "編集モード";
                btn.style.background = "#38bdf8";
                btn.style.color = "#0f172a";
                form.style.display = "none";
            }
            applyEditModeStyles();
        }

        function applyEditModeStyles() {
            const catDelBtns = document.querySelectorAll('.category-del-btn');
            catDelBtns.forEach(b => b.style.display = isEditMode ? 'block' : 'none');

            Object.keys(dashboardData).forEach(catName => {
                dashboardData[catName].forEach((_, index) => {
                    const delBtn = document.getElementById(`del-${catName}-${index}`);
                    const linkItem = document.getElementById(`link-${catName}-${index}`);
                    if (delBtn && linkItem) {
                        if (isEditMode) {
                            delBtn.style.display = "block";
                            linkItem.removeAttribute('href');
                            linkItem.style.cursor = "default";
                        } else {
                            delBtn.style.display = "none";
                            linkItem.setAttribute('href', dashboardData[catName][index].url);
                            linkItem.style.cursor = "pointer";
                        }
                    }
                });
            });
        }

        function addCategory() {
            const input = document.getElementById('newCatName');
            const name = input.value.trim();
            if (name && !dashboardData[name]) {
                dashboardData[name] = [];
                saveData();
                input.value = '';
                renderDashboard();
            }
        }

        function deleteCategory(catName) {
            if (confirm(`カテゴリー「${catName}」と中身のリンクをすべて削除しますか？`)) {
                delete dashboardData[catName];
                saveData();
                renderDashboard();
            }
        }

        function addLink() {
            const catSelect = document.getElementById('linkCategorySelect');
            const nameInput = document.getElementById('linkName');
            const urlInput = document.getElementById('linkUrl');

            const cat = catSelect.value;
            let name = nameInput.value.trim();
            let url = urlInput.value.trim();

            if (!cat || !name || !url) {
                alert('すべての項目を入力・選択してください。');
                return;
            }
            if (!/^https?:\/\//i.test(url)) url = 'https://' + url;

            dashboardData[cat].push({ name: name, url: url });
            saveData();

            nameInput.value = '';
            urlInput.value = '';
            renderDashboard();
        }

        function deleteLink(catName, index) {
            dashboardData[catName].splice(index, 1);
            saveData();
            renderDashboard();
        }

        function saveData() {
            localStorage.setItem('myCategorizedLinks', JSON.stringify(dashboardData));
        }

        // --- 初期実行 ＆ タイマー起動 ---
        applySavedBackground();
        renderDashboard();
        renderTodos();
        renderNewsFeed();

        // 最初の一回目の描画
        renderMarketTable();
        
        // 【10秒に1回】マーケットとニュースを自動更新
        setInterval(updateMarketData, 10000);
    </script>
</body>
</html>
