<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スタートページ</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            /* 初期値（画像未設定時）のグラデーション */
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 50px 20px;
            /* 背景画像の共通設定 */
            background-repeat: no-repeat;
            background-position: center center;
            background-attachment: fixed;
            background-size: cover;
            transition: background 0.5s ease; /* 背景切り替えをなめらかに */
        }

        /* 時計エリア */
        .clock-container {
            text-align: center;
            margin-bottom: 50px;
            text-shadow: 0 4px 12px rgba(0, 0, 0, 0.7);
        }

        .time {
            font-size: 5.5rem;
            font-weight: bold;
            letter-spacing: 3px;
        }

        .date {
            font-size: 1.6rem;
            color: #e2e8f0;
            margin-top: 10px;
        }

        /* メイングリッド */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 30px;
            width: 100%;
            max-width: 1200px;
        }

        /* 各カードの共通スタイル（すりガラス効果） */
        .card {
            background: rgba(15, 23, 42, 0.5); 
            backdrop-filter: blur(16px);       
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 25px;
            height: fit-content;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            margin-bottom: 25px;
        }

        .card h2 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #38bdf8;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* 編集ボタン */
        .edit-btn {
            background: #38bdf8;
            color: #0f172a;
            padding: 6px 16px;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            border: none;
            transition: 0.2s;
        }

        .edit-btn:hover {
            background: #0ea5e9;
        }

        /* カテゴリーセクション */
        .category-section {
            margin-bottom: 25px;
            background: rgba(255, 255, 255, 0.02);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .category-header {
            font-size: 1.2rem;
            font-weight: bold;
            color: #e2e8f0;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .category-del-btn {
            display: none;
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
        }

        /* リンク（ショートカット） */
        .shortcut-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .shortcut-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        .shortcut-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px;
            background: rgba(255, 255, 255, 0.07);
            border-radius: 8px;
            color: #fff;
            text-decoration: none;
            transition: 0.2s;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 1.1rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
        }

        .shortcut-item:hover {
            background: rgba(56, 189, 248, 0.25);
            transform: translateY(-2px);
        }

        .shortcut-icon {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            object-fit: contain;
        }

        /* 削除ボタン */
        .delete-link-btn {
            display: none;
            position: absolute;
            right: 12px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            font-size: 0.9rem;
            cursor: pointer;
            line-height: 24px;
            text-align: center;
        }

        /* 編集フォーム */
        .edit-form {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: rgba(15, 23, 42, 0.95);
            border-radius: 10px;
            border: 1px dashed rgba(255, 255, 255, 0.2);
            flex-direction: column;
            gap: 18px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 1.05rem;
            color: #38bdf8;
            font-weight: bold;
        }

        .edit-form input, .edit-form select {
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #38bdf8;
            background: #1e293b;
            color: #ffffff;
            font-size: 1rem;
            outline: none;
        }

        .edit-form select option {
            background: #1e293b;
            color: #ffffff;
        }

        /* 新しいサイドバーパーツのスタイル */
        .trend-card-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 18px;
            border-radius: 10px;
            color: #fff;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: bold;
            transition: 0.2s;
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
        }

        .trend-card-link:hover {
            background: rgba(56, 189, 248, 0.25);
            transform: translateY(-2px);
        }

        /* 👑 マーケットテーブルとミニグラフ */
        .market-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .market-table th, .market-table td {
            padding: 12px 6px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            vertical-align: middle;
        }

        .market-table th {
            color: #94a3b8;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .market-table td {
            font-size: 1.05rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
        }

        .market-sparkline {
            width: 70px;
            height: 25px;
            vertical-align: middle;
        }

        .price-down {
            color: #ef4444; /* 下落（赤）*/
            font-weight: bold;
        }

        .price-up {
            color: #10b981; /* 上昇（緑）*/
            font-weight: bold;
        }

        .market-date {
            font-size: 0.8rem;
            color: #94a3b8;
            text-align: right;
            margin-top: 12px;
        }
    </style>
</head>
<body>

    <div class="clock-container">
        <div class="time" id="clock">00:00:00</div>
        <div class="date" id="date">2026年1月1日 (木)</div>
    </div>

    <div class="dashboard-grid">
        
        <div class="card">
            <h2>
                マイリンク（カテゴリー別）
                <button onclick="toggleEditMode()" id="editModeBtn" class="edit-btn">編集</button>
            </h2>
            
            <div id="categoriesContainer">
                </div>

            <div id="editForm" class="edit-form">
                <div class="form-group" style="margin-bottom:5px; border-bottom:1px dashed rgba(255,255,255,0.2); padding-bottom:15px;">
                    <label>🖼 壁紙画像を変更（画像URLを入力）</label>
                    <div style="display:flex; gap:10px;">
                        <input type="text" id="bgUrlInput" placeholder="https://example.com/image.jpg" style="flex:1;">
                        <button onclick="updateBackground()" class="edit-btn">適用</button>
                    </div>
                </div>

                <div class="form-group">
                    <label>【1】新しいカテゴリーを追加</label>
                    <div style="display:flex; gap:10px;">
                        <input type="text" id="newCatName" placeholder="例: ニュース" style="flex:1;">
                        <button onclick="addCategory()" class="edit-btn">作成</button>
                    </div>
                </div>
                
                <div class="form-group" style="margin-top:5px; border-top:1px dashed rgba(255,255,255,0.2); padding-top:20px;">
                    <label>【2】サイトを追加</label>
                    <select id="linkCategorySelect">
                        </select>
                    <input type="text" id="linkName" placeholder="サイト名（例: Google）" style="margin-top:8px;">
                    <input type="text" id="linkUrl" placeholder="URL（例: google.com）" style="margin-top:8px;">
                    <button onclick="addLink()" class="edit-btn" style="width: 100%; margin-top:12px;">サイトを登録</button>
                </div>
            </div>
        </div>

        <div class="right-column">
            
            <div class="card">
                <h2>🌐 トレンドキーワード</h2>
                <p style="font-size: 0.95rem; color: #cbd5e1; margin-bottom: 15px; line-height: 1.5;">今、世の中で何が一番検索されているかリアルタイムでチェックします。</p>
                <a href="https://trends.google.co.jp/trends/trendingsearches/daily?geo=JP" target="_blank" class="trend-card-link">
                    📈 Google急上昇ワードを開く
                    <span>➔</span>
                </a>
            </div>

            <div class="card">
                <h2>📈 マーケット情報</h2>
                <table class="market-table">
                    <thead>
                        <tr>
                            <th>指標</th>
                            <th>現在値</th>
                            <th style="width: 80px; text-align: center;">推移</th>
                            <th style="text-align: right; padding-right: 12px;">前日比</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td><strong>日経平均</strong></td>
                            <td>66,970.98円</td>
                            <td style="text-align: center;">
                                <canvas id="chartNikkei" class="market-sparkline" width="70" height="25"></canvas>
                            </td>
                            <td class="price-down" style="text-align: right; padding-right: 12px;">-1,586.75円</td>
                        </tr>
                        <tr>
                            <td><strong>ドル / 円</strong></td>
                            <td>162.05円</td>
                            <td style="text-align: center;">
                                <canvas id="chartUsdJpy" class="market-sparkline" width="70" height="25"></canvas>
                            </td>
                            <td class="price-up" style="text-align: right; padding-right: 12px;">+0.36円</td>
                        </tr>
                    </tbody>
                </table>
                <div class="market-date" id="market-update-time">2026年7月15日 現在</div>
            </div>

        </div>

    </div>

    <script>
        // 時計の更新機能
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds}`;
            
            const year = now.getFullYear();
            const month = now.getMonth() + 1;
            const date = now.getDate();
            const dayNames = ['日', '月', '火', '水', '木', '金', '土'];
            const day = dayNames[now.getDay()];
            document.getElementById('date').textContent = `${year}年${month}月${date}日 (${day})`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- 👑 ミニトレンドグラフ（スパークライン）描画スクリプト ---
        function drawSparkline(canvasId, dataPoints, strokeColor) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const width = canvas.width;
            const height = canvas.height;

            // 高解像度ディスプレイ向けにクリアにする
            const dpr = window.devicePixelRatio || 1;
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            ctx.scale(dpr, dpr);

            ctx.clearRect(0, 0, width, height);

            const min = Math.min(...dataPoints);
            const max = Math.max(...dataPoints);
            const range = max - min === 0 ? 1 : max - min;

            ctx.beginPath();
            ctx.lineWidth = 2.5;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = strokeColor;

            // 各点の座標を計算してプロット
            dataPoints.forEach((val, i) => {
                const x = (i / (dataPoints.length - 1)) * (width - 4) + 2;
                const y = height - ((val - min) / range) * (height - 6) - 3;
                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            });
            ctx.stroke();

            // 下部に半透明のグラデーション影を落とす
            ctx.lineTo((width - 4) + 2, height);
            ctx.lineTo(2, height);
            ctx.closePath();
            ctx.fillStyle = strokeColor === '#ef4444' ? 'rgba(239, 68, 68, 0.15)' : 'rgba(16, 185, 129, 0.15)';
            ctx.fill();
        }

        // グラフ用デモデータ（今日の株価・ドル円の値動きイメージ）
        // 日経平均：大幅下落傾向の推移
        drawSparkline('chartNikkei', [68500, 68200, 67900, 67500, 67800, 67200, 66970], '#ef4444');
        // ドル円：じわじわ上昇（円安）傾向の推移
        drawSparkline('chartUsdJpy', [161.60, 161.75, 161.70, 161.90, 161.85, 162.00, 162.05], '#10b981');


        // --- カテゴリー＆リンクデータ管理 ---
        const defaultData = {
            "🔍 検索エンジン": [
                { name: "Google", url: "https://www.google.com" },
                { name: "Yahoo! JAPAN", url: "https://www.yahoo.co.jp" }
            ],
            "🛠 業務効率化ツール": [
                { name: "GitHub", url: "https://github.com" },
                { name: "ChatGPT", url: "https://chatgpt.com" }
            ],
            "📺 エンタメ・SNS": [
                { name: "YouTube", url: "https://www.youtube.com" },
                { name: "X (Twitter)", url: "https://twitter.com" }
            ]
        };

        let dashboardData = JSON.parse(localStorage.getItem('myCategorizedLinks')) || defaultData;
        let isEditMode = false;

        // デフォルト背景に指定の「山の4K壁紙」をセット
        const defaultBg = "https://divnil.com/wallpaper/ipad/img/app/m/o/mountains-4k-wallpaper-3840x2160-2048x2048_0b97954feb5ddc0033010b30ba3fd21d_raw.jpg";
        let savedBgUrl = localStorage.getItem('myDashboardBg') || defaultBg;

        function applySavedBackground() {
            if (savedBgUrl) {
                // 文字が見やすくなるよう薄暗いマスクを重ねて画像を適用
                document.body.style.background = `linear-gradient(rgba(15, 23, 42, 0.65), rgba(15, 23, 42, 0.65)), url('${savedBgUrl}') no-repeat center center fixed`;
                document.body.style.backgroundSize = "cover";
                document.getElementById('bgUrlInput').value = savedBgUrl;
            }
        }

        // 画面から背景を変更する関数
        function updateBackground() {
            const input = document.getElementById('bgUrlInput');
            const newUrl = input.value.trim();
            if (newUrl) {
                savedBgUrl = newUrl;
                localStorage.setItem('myDashboardBg', newUrl);
                applySavedBackground();
            } else {
                // 空っぽにして適用した場合はデフォルト画像に戻す
                savedBgUrl = defaultBg;
                localStorage.setItem('myDashboardBg', defaultBg);
                applySavedBackground();
            }
        }

        function renderDashboard() {
            const container = document.getElementById('categoriesContainer');
            const select = document.getElementById('linkCategorySelect');
            
            container.innerHTML = '';
            select.innerHTML = '';

            Object.keys(dashboardData).forEach((catName) => {
                const option = document.createElement('option');
                option.value = catName;
                option.textContent = catName;
                select.appendChild(option);

                const section = document.createElement('div');
                section.className = 'category-section';

                const header = document.createElement('div');
                header.className = 'category-header';
                header.innerHTML = `
                    <span>${catName}</span>
                    <button class="category-del-btn" onclick="deleteCategory('${catName}')">カテゴリー削除</button>
                `;
                section.appendChild(header);

                const list = document.createElement('div');
                list.className = 'shortcut-list';

                dashboardData[catName].forEach((link, index) => {
                    const shortcutContainer = document.createElement('div');
                    shortcutContainer.className = 'shortcut-container';

                    const faviconUrl = `https://www.google.com/s2/favicons?sz=64&domain=${encodeURIComponent(link.url)}`;

                    shortcutContainer.innerHTML = `
                        <a href="${link.url}" target="_blank" class="shortcut-item" id="link-${catName}-${index}">
                            <img src="${faviconUrl}" class="shortcut-icon" alt="" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'%23fff\' stroke-width=\'2\'><circle cx=\'12\' cy=\'12\' r=\'10\'></circle></svg>'">
                            ${link.name}
                        </a>
                        <button class="delete-link-btn" id="del-${catName}-${index}" onclick="deleteLink('${catName}', ${index})">✕</button>
                    `;
                    list.appendChild(shortcutContainer);
                });

                section.appendChild(list);
                container.appendChild(section);
            });

            applyEditModeStyles();
        }

        function toggleEditMode() {
            isEditMode = !isEditMode;
            const btn = document.getElementById('editModeBtn');
            const form = document.getElementById('editForm');
            
            if (isEditMode) {
                btn.textContent = "終了";
                btn.style.background = "#ef4444";
                btn.style.color = "#fff";
                form.style.display = "flex";
            } else {
                btn.textContent = "編集";
                btn.style.background = "#38bdf8";
                btn.style.color = "#0f172a";
                form.style.display = "none";
            }
            applyEditModeStyles();
        }

        function applyEditModeStyles() {
            const catDelBtns = document.querySelectorAll('.category-del-btn');
            catDelBtns.forEach(b => b.style.display = isEditMode ? 'block' : 'none');

            Object.keys(dashboardData).forEach(catName => {
                dashboardData[catName].forEach((_, index) => {
                    const delBtn = document.getElementById(`del-${catName}-${index}`);
                    const linkItem = document.getElementById(`link-${catName}-${index}`);
                    if (delBtn && linkItem) {
                        if (isEditMode) {
                            delBtn.style.display = "block";
                            linkItem.removeAttribute('href');
                            linkItem.style.cursor = "default";
                        } else {
                            delBtn.style.display = "none";
                            linkItem.setAttribute('href', dashboardData[catName][index].url);
                            linkItem.style.cursor = "pointer";
                        }
                    }
                });
            });
        }

        function addCategory() {
            const input = document.getElementById('newCatName');
            const name = input.value.trim();
            if (name && !dashboardData[name]) {
                dashboardData[name] = [];
                saveData();
                input.value = '';
                renderDashboard();
            }
        }

        function deleteCategory(catName) {
            if (confirm(`カテゴリー「${catName}」と中身のリンクをすべて削除しますか？`)) {
                delete dashboardData[catName];
                saveData();
                renderDashboard();
            }
        }

        function addLink() {
            const catSelect = document.getElementById('linkCategorySelect');
            const nameInput = document.getElementById('linkName');
            const urlInput = document.getElementById('linkUrl');

            const cat = catSelect.value;
            let name = nameInput.value.trim();
            let url = urlInput.value.trim();

            if (!cat || !name || !url) {
                alert('すべての項目を入力・選択してください。');
                return;
            }
            if (!/^https?:\/\//i.test(url)) url = 'https://' + url;

            dashboardData[cat].push({ name: name, url: url });
            saveData();

            nameInput.value = '';
            urlInput.value = '';
            renderDashboard();
        }

        function deleteLink(catName, index) {
            dashboardData[catName].splice(index, 1);
            saveData();
            renderDashboard();
        }

        function saveData() {
            localStorage.setItem('myCategorizedLinks', JSON.stringify(dashboardData));
        }

        // 初期実行
        applySavedBackground();
        renderDashboard();
    </script>
</body>
</html>
