<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポータルサイト（β版）</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 40px 20px;
            background-repeat: no-repeat;
            background-position: center center;
            background-attachment: fixed;
            background-size: cover;
            transition: background 0.5s ease;
        }

        /* ヘッダーエリア */
        .portal-header {
            text-align: center;
            margin-bottom: 35px;
            text-shadow: 0 4px 12px rgba(0, 0, 0, 0.7);
            position: relative;
            width: 100%;
            max-width: 1200px;
        }

        /* 時計エリア */
        .clock-container {
            text-align: center;
            margin-bottom: 10px;
        }

        .time {
            font-size: 4.2rem;
            font-weight: bold;
            letter-spacing: 2px;
            color: #ffffff;
        }

        .date {
            font-size: 1.25rem;
            color: #cbd5e1;
            margin-top: 5px;
            font-weight: 500;
        }

        /* メイングリッド (2カラム構成) */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 30px;
            width: 100%;
            max-width: 1200px;
            align-items: start;
        }

        /* 各カードの共通スタイル（すりガラス効果） */
        .card {
            background: rgba(15, 23, 42, 0.5); 
            backdrop-filter: blur(16px);       
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            margin-bottom: 25px;
            overflow: hidden;
        }

        .card h2 {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: #38bdf8;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 30px;
        }

        /* ライフ情報専用のカードスタイル（高さを固定せずフレキシブルに） */
        .life-info-card {
            display: flex;
            flex-direction: column;
        }

        /* カテゴリーカード（左カラム） */
        .category-card {
            background: rgba(15, 23, 42, 0.5); 
            backdrop-filter: blur(16px);       
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            margin-bottom: 25px;
        }

        .category-card-header {
            font-size: 1.3rem;
            font-weight: bold;
            color: #38bdf8;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* 管理用ヘッダーカード */
        .admin-card {
            background: rgba(15, 23, 42, 0.35);
            border: 1px dashed rgba(255, 255, 255, 0.15);
            margin-top: 20px;
        }

        /* 各種ボタン */
        .edit-btn {
            background: #38bdf8;
            color: #0f172a;
            padding: 6px 16px;
            border-radius: 6px;
            font-size: 0.95rem;
            cursor: pointer;
            font-weight: bold;
            border: none;
            transition: 0.2s;
        }

        .edit-btn:hover {
            background: #0ea5e9;
        }

        .category-del-btn {
            display: none;
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: bold;
        }

        /* リンク（ショートカット） */
        .shortcut-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .shortcut-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        .shortcut-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px;
            background: rgba(255, 255, 255, 0.07);
            border-radius: 8px;
            color: #fff;
            text-decoration: none;
            transition: 0.2s;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 1.05rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
        }

        .shortcut-item:hover {
            background: rgba(56, 189, 248, 0.25);
            transform: translateY(-2px);
        }

        .shortcut-icon {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            object-fit: contain;
        }

        /* 削除ボタン */
        .delete-link-btn {
            display: none;
            position: absolute;
            right: 12px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            font-size: 0.9rem;
            cursor: pointer;
            line-height: 24px;
            text-align: center;
        }

        /* ライフ情報：詳細お天気パネルスタイル */
        .weather-panel-detailed {
            background: rgba(56, 189, 248, 0.08);
            border: 1px solid rgba(56, 189, 248, 0.25);
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 22px;
            text-decoration: none;
            color: white;
            display: block;
            transition: 0.2s ease;
            height: auto;
        }

        .weather-panel-detailed:hover {
            background: rgba(56, 189, 248, 0.15);
            border-color: rgba(56, 189, 248, 0.4);
            transform: translateY(-2px);
        }

        .weather-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .weather-main {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .weather-big-icon {
            font-size: 3rem;
            line-height: 1;
        }

        .weather-temp-now {
            font-size: 1.8rem;
            font-weight: bold;
        }

        .weather-grid-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            font-size: 0.85rem;
            background: rgba(15, 23, 42, 0.3);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .weather-grid-item {
            display: flex;
            justify-content: space-between;
            color: #cbd5e1;
            white-space: nowrap;
        }

        .weather-grid-item span {
            font-weight: bold;
            color: #ffffff;
        }

        /* ニュースリスト */
        .news-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .news-item {
            display: block;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            color: #e2e8f0;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.2s;
            border-left: 3px solid #38bdf8;
            
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            height: 40px;
            line-height: 20px;
        }

        .news-item:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            transform: translateX(4px);
        }

        /* 編集フォーム */
        .edit-form {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: rgba(15, 23, 42, 0.95);
            border-radius: 10px;
            border: 1px dashed rgba(255, 255, 255, 0.2);
            flex-direction: column;
            gap: 18px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 1rem;
            color: #38bdf8;
            font-weight: bold;
        }

        .edit-form input, .edit-form select {
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #38bdf8;
            background: #1e293b;
            color: #ffffff;
            font-size: 1rem;
            outline: none;
        }

        .edit-form select option {
            background: #1e293b;
            color: #ffffff;
        }

        /* トレンドリンクスタイル */
        .trend-card-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 18px;
            border-radius: 10px;
            color: #fff;
            text-decoration: none;
            font-size: 1.05rem;
            font-weight: bold;
            transition: 0.2s;
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
        }

        .trend-card-link:hover {
            background: rgba(56, 189, 248, 0.25);
            transform: translateY(-2px);
        }

        /* マーケットテーブル */
        .market-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .market-table th, .market-table td {
            padding: 12px 6px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            vertical-align: middle;
        }

        .market-table th {
            color: #94a3b8;
            font-weight: bold;
            font-size: 0.85rem;
        }

        .market-table td {
            font-size: 1rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
        }

        .clickable-row {
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        .clickable-row:hover {
            background-color: rgba(255, 255, 255, 0.08);
        }

        .clickable-row:active {
            transform: scale(0.99);
        }

        .market-sparkline {
            width: 70px;
            height: 25px;
            vertical-align: middle;
        }

        .price-down {
            color: #ef4444;
            font-weight: bold;
        }

        .price-up {
            color: #10b981;
            font-weight: bold;
        }

        .market-date {
            font-size: 0.8rem;
            color: #94a3b8;
            text-align: right;
            margin-top: 12px;
        }

        @media (max-width: 1024px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="portal-header">

            <div class="time" id="clock">00:00:00</div>

    <div class="dashboard-grid">
        
        <div class="left-column">

            <div class="card admin-card" style="padding: 18px 25px;">
                <div style="display: flex; justify-content: space-between; align-items: center;">

    <script>
        // 時計の更新機能
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds}`;
            
            const year = now.getFullYear();
            const month = now.getMonth() + 1;
            const date = now.getDate();
            const dayNames = ['日', '月', '火', '水', '木', '金', '土'];
            const day = dayNames[now.getDay()];
            document.getElementById('date').textContent = `${year}年${month}月${date}日 (${day})`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- 朝刊ニュース風デモヘッドライン ---
        const newsDataList = [

            { title: "【経済】日経平均株価、ハイテク株牽引で好調な動きを維持し、明日の取引に期待がかかる展開", url: "https://yahoo.co.jp" },
            { title: "【気象】週末にかけて穏やかな晴天、全国的な洗濯日和になりお出かけにも最適な環境に", url: "https://yahoo.co.jp" },
            { title: "【ガジェット】新型スマートグラス、劇的な薄型軽量化に成功し今年の秋頃に全世界で発売か", url: "https://yahoo.co.jp" },
            { title: "【ライフ】朝一番の「白湯」がもたらす素晴らしい健康効果、美容関係者の間で改めて大きな注目集まる", url: "https://yahoo.co.jp" },
            { title: "【トレンド】昭和レトロな純喫茶風の固めプリン、SNSをきっかけにZ世代の間で空前の大ヒットを記録中", url: "https://yahoo.co.jp" }
        ];

        // 初回読み込み時にのみニュースを選択・描画する
        function initNewsFeed() {
            const feed = document.getElementById('newsFeed');
            feed.innerHTML = '';
            
            // ランダムに3件抽出
            const shuffled = [...newsDataList].sort(() => 0.5 - Math.random());

        // --- マーケットデータ定義＆10秒自動更新処理 ---
        const marketData = {

        // スパークライン描画ヘルパー
        function drawSparkline(canvasId, dataPoints, strokeColor) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const width = canvas.width;
            const height = canvas.height;

            const dpr = window.devicePixelRatio || 1;
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            ctx.scale(dpr, dpr);

            ctx.clearRect(0, 0, width, height);

            const min = Math.min(...dataPoints);
            const max = Math.max(...dataPoints);
            const range = max - min === 0 ? 1 : max - min;

            ctx.beginPath();
            ctx.lineWidth = 2.5;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = strokeColor;

            dataPoints.forEach((val, i) => {
                const x = (i / (dataPoints.length - 1)) * (width - 4) + 2;
                const y = height - ((val - min) / range) * (height - 6) - 3;
                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            });
            ctx.stroke();

            ctx.lineTo((width - 4) + 2, height);
            ctx.lineTo(2, height);
            ctx.closePath();
            ctx.fillStyle = strokeColor === '#ef4444' ? 'rgba(239, 68, 68, 0.15)' : 'rgba(16, 185, 129, 0.15)';
            ctx.fill();
        }

        // マーケットテーブルのレンダリング
        function renderMarketTable() {
            const tbody = document.getElementById('market-table-body');
            tbody.innerHTML = '';

            Object.keys(marketData).forEach(key => {
                const item = marketData[key];
                const tr = document.createElement('tr');
                tr.className = 'clickable-row';
                tr.onclick = () => window.open(item.link, '_blank');

                const isUp = item.change >= 0;
                const changeClass = isUp ? 'price-up' : 'price-down';
                const prefix = isUp ? '+' : '';
                
                const formattedVal = item.currentVal.toLocaleString(undefined, { minimumFractionDigits: item.decimals, maximumFractionDigits: item.decimals });
                const formattedChange = item.change.toLocaleString(undefined, { minimumFractionDigits: item.decimals, maximumFractionDigits: item.decimals });

                tr.innerHTML = `
                    <td><strong>${item.name}</strong></td>
                    <td>${formattedVal}${item.unit}</td>
                    <td style="text-align: center;">
                        <canvas id="canvas-${key}" class="market-sparkline" width="70" height="25"></canvas>
                    </td>
                    <td class="${changeClass}" style="text-align: right; padding-right: 12px;">
                        ${prefix}${formattedChange}${item.unit}
                    </td>
                `;
                tbody.appendChild(tr);

                const strokeColor = isUp ? '#10b981' : '#ef4444';
                drawSparkline(`canvas-${key}`, item.history, strokeColor);
            });

            const now = new Date();
            const formatTime = `${now.getFullYear()}年${now.getMonth() + 1}月${now.getDate()}日 ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')} 現在`;
            document.getElementById('market-update-time').textContent = formatTime;
        }

        // マーケットデータの値のみを10秒ごとにアップデート
        function updateMarketData() {
            Object.keys(marketData).forEach(key => {
                const item = marketData[key];
                const changePercent = (Math.random() - 0.5) * 0.0002; 
                const delta = item.currentVal * changePercent;

                item.currentVal += delta;
                item.change += delta;
                item.history[item.history.length - 1] = item.currentVal;
            });
            renderMarketTable();
            // (※ ライフ情報・ニュースを定期更新していた処理 `renderNewsFeed()` は、自動更新されないようここから除外しました)
        }

        // --- カテゴリー＆リンクデータ管理 ---
        const defaultData = {
            "🔍 検索エンジン": [
                { name: "Google", url: "https://www.google.com" },
                { name: "Yahoo! JAPAN", url: "https://www.yahoo.co.jp" },
                { name: "Microsoft Bing", url: "https://www.bing.com" },
                { name: "Perplexity AI", url: "https://www.perplexity.ai" },
                { name: "DuckDuckGo", url: "https://duckduckgo.com" }
            ],
            "🤖 AIツール": [
                { name: "ChatGPT", url: "https://chatgpt.com" },
                { name: "Claude", url: "https://claude.ai" },
                { name: "Gemini", url: "https://gemini.google.com" },
                { name: "DeepL", url: "https://www.deepl.com" }
            ],
            "🛠 業務効率化ツール": [
                { name: "GitHub", url: "https://github.com" },
                { name: "Notion", url: "https://www.notion.so" },
                { name: "Trello", url: "https://trello.com" },
                { name: "Slack", url: "https://slack.com" },
                { name: "Zoom", url: "https://zoom.us" },
                { name: "Google ドライブ", url: "https://drive.google.com" }
            ],
            "📺 エンタメ・SNS": [
                { name: "YouTube", url: "https://www.youtube.com" },
                { name: "X (Twitter)", url: "https://twitter.com" },
                { name: "Instagram", url: "https://www.instagram.com" },
                { name: "TikTok", url: "https://www.tiktok.com" },
                { name: "Twitch", url: "https://www.twitch.tv" },
                { name: "Pinterest", url: "https://www.pinterest.com" },
                { name: "Netflix", url: "https://www.netflix.com" },
                { name: "Amazonプライム", url: "https://www.amazon.co.jp/prime" }
            ]
        };

        let dashboardData = JSON.parse(localStorage.getItem('myCategorizedLinks')) || defaultData;
        let isEditMode = false;

        const defaultBg = "https://divnil.com/wallpaper/ipad/img/app/m/o/mountains-4k-wallpaper-3840x2160-2048x2048_0b97954feb5ddc0033010b30ba3fd21d_raw.jpg";
        let savedBgUrl = localStorage.getItem('myDashboardBg') || defaultBg;

        function applySavedBackground() {
            if (savedBgUrl) {
                document.body.style.background = `linear-gradient(rgba(15, 23, 42, 0.65), rgba(15, 23, 42, 0.65)), url('${savedBgUrl}') no-repeat center center fixed`;
                document.body.style.backgroundSize = "cover";
                document.getElementById('bgUrlInput').value = savedBgUrl;
            }
        }

        function updateBackground() {
            const input = document.getElementById('bgUrlInput');
            const newUrl = input.value.trim();
            if (newUrl) {
                savedBgUrl = newUrl;
                localStorage.setItem('myDashboardBg', newUrl);
                applySavedBackground();
            } else {
                savedBgUrl = defaultBg;
                localStorage.setItem('myDashboardBg', defaultBg);
                applySavedBackground();
            }
        }

        function renderDashboard() {
            const container = document.getElementById('categoriesContainer');
            const select = document.getElementById('linkCategorySelect');
            
            container.innerHTML = '';
            select.innerHTML = '';

            Object.keys(dashboardData).forEach((catName) => {
                const option = document.createElement('option');
                option.value = catName;
                option.textContent = catName;
                select.appendChild(option);

                const section = document.createElement('div');
                section.className = 'category-card';

                const header = document.createElement('div');
                header.className = 'category-card-header';
                header.innerHTML = `
                    <span>${catName}</span>
                    <button class="category-del-btn" onclick="deleteCategory('${catName}')">カテゴリー削除</button>
                `;
                section.appendChild(header);

                const list = document.createElement('div');
                list.className = 'shortcut-list';

                dashboardData[catName].forEach((link, index) => {
                    const shortcutContainer = document.createElement('div');
                    shortcutContainer.className = 'shortcut-container';

                    const faviconUrl = `https://www.google.com/s2/favicons?sz=64&domain=${encodeURIComponent(link.url)}`;

                    shortcutContainer.innerHTML = `
                        <a href="${link.url}" target="_blank" class="shortcut-item" id="link-${catName}-${index}">
                            <img src="${faviconUrl}" class="shortcut-icon" alt="" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'%23fff\' stroke-width=\'2\'><circle cx=\'12\' cy=\'12\' r=\'10\'></circle></svg>'">
                            ${link.name}
                        </a>
                        <button class="delete-link-btn" id="del-${catName}-${index}" onclick="deleteLink('${catName}', ${index})">✕</button>
                    `;
                    list.appendChild(shortcutContainer);
                }); section.appendChild(list);
                container.appendChild(section);
            });

            applyEditModeStyles();
        }

        function toggleEditMode() {
            isEditMode = !isEditMode;
            const btn = document.getElementById('editModeBtn');
            const form = document.getElementById('editForm');
            
            if (isEditMode) {
                btn.textContent = "設定を閉じる";
                btn.style.background = "#ef4444";
                btn.style.color = "#fff";
                form.style.display = "flex";
            } else {
                btn.textContent = "編集モード";
                btn.style.background = "#38bdf8";
                btn.style.color = "#0f172a";
                form.style.display = "none";
            }
            applyEditModeStyles();
        }

        function applyEditModeStyles() {
            const catDelBtns = document.querySelectorAll('.category-del-btn');
            catDelBtns.forEach(b => b.style.display = isEditMode ? 'block' : 'none');

            Object.keys(dashboardData).forEach(catName => {
                dashboardData[catName].forEach((_, index) => {
                    const delBtn = document.getElementById(`del-${catName}-${index}`);
                    const linkItem = document.getElementById(`link-${catName}-${index}`);
                    if (delBtn && linkItem) {
                        if (isEditMode) {
                            delBtn.style.display = "block";
                            linkItem.removeAttribute('href');
                            linkItem.style.cursor = "default";
                        } else {
                            delBtn.style.display = "none";
                            linkItem.setAttribute('href', dashboardData[catName][index].url);
                            linkItem.style.cursor = "pointer";
                        }
                    }
                });
            });
        }

        function addCategory() {
            const input = document.getElementById('newCatName');
            const name = input.value.trim();
            if (name && !dashboardData[name]) {
                dashboardData[name] = [];
                saveData();
                input.value = '';
                renderDashboard();
            }
        }

        function deleteCategory(catName) {
            if (confirm(`カテゴリー「${catName}」と中身のリンクをすべて削除しますか？`)) {
                delete dashboardData[catName];
                saveData();
                renderDashboard();
            }
        }

        function addLink() {
            const catSelect = document.getElementById('linkCategorySelect');
            const nameInput = document.getElementById('linkName');
            const urlInput = document.getElementById('linkUrl');

            const cat = catSelect.value;
            let name = nameInput.value.trim();
            let url = urlInput.value.trim();

            if (!cat || !name || !url) {
                alert('すべての項目を入力・選択してください。');
                return;
            }
            if (!/^https?:\/\//i.test(url)) url = 'https://' + url;

            dashboardData[cat].push({ name: name, url: url });
            saveData();

            nameInput.value = '';
            urlInput.value = '';
            renderDashboard();
        }

        function deleteLink(catName, index) {
            dashboardData[catName].splice(index, 1);
            saveData();
            renderDashboard();
        }

        function saveData() {
            localStorage.setItem('myCategorizedLinks', JSON.stringify(dashboardData));
        }

        applySavedBackground();
        renderDashboard();
        
        // ライフ情報は初回ロード時のみ描画（自動更新ループから除外）
        initNewsFeed();
        
        renderMarketTable();
        setInterval(updateMarketData, 10000); // マーケットの10秒更新は維持
    </script>
</body>
</html>
