<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポータルサイト（β版）</title>
    <style>
        /* 基本設定 */
        html {
            scroll-behavior: smooth;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            background-size: cover;
            background-attachment: fixed;
        }

        /* ヘッダーエリア */
        .portal-header {
            text-align: center;
            margin-bottom: 40px;
            width: 100%;
            max-width: 1200px;
        }

        /* 時計デザイン */
        .time {
            font-size: 4.5rem;
            font-weight: bold;
            color: #ffffff;
            display: flex;
            justify-content: center;
            gap: 2px;
        }

        .digit-container {
            display: inline-block;
            height: 5rem;
            overflow: hidden;
            position: relative;
            width: 2.8rem;
            text-align: center;
        }

        .digit-strip {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
        }

        .digit-strip span {
            display: inline-block;
            height: 5rem;
            line-height: 5rem;
        }

        .time-colon {
            display: inline-block;
            line-height: 4.6rem;
            width: 1.5rem;
            text-align: center;
            font-size: 3rem;
            color: #38bdf8;
        }

        .date {
            font-size: 1.2rem;
            color: #cbd5e1;
            margin-top: 10px;
        }

        /* 検索バーエリア */
        .search-container {
            width: 100%;
            max-width: 720px;
            margin: 0 auto 30px auto;
            position: relative;
        }

        .search-form {
            display: flex;
            align-items: center;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(20px);
            border: 2px solid #38bdf8;
            border-radius: 60px;
            padding: 0 10px 0 24px;
            height: 60px;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
        }

        .search-select {
            background: transparent;
            color: #38bdf8;
            border: none;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
        }

        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 1.3rem;
            padding: 10px;
            margin-left: 10px;
        }

        .search-submit-btn {
            background: #38bdf8;
            color: #0f172a;
            border: none;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            cursor: pointer;
            font-size: 1.5rem;
        }

        /* 予測変換リスト */
        #suggestionBox {
            position: absolute;
            top: 70px;
            left: 0;
            width: 100%;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid #38bdf8;
            border-radius: 20px;
            z-index: 1000;
            overflow: hidden;
            display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .suggestion-item {
            padding: 12px 24px;
            cursor: pointer;
            color: #e2e8f0;
            transition: 0.2s;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .suggestion-item:hover {
            background: rgba(56, 189, 248, 0.2);
            color: white;
        }

        /* グリッドレイアウト */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
            width: 100%;
            max-width: 1250px;
        }

        .card {
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 25px;
        }
    </style>
</head>
<body>

    <div class="portal-header">
        <div class="time" id="clock">
            <span class="digit-container"><span class="digit-strip" id="h1"><span>012</span></span></span>
            <span class="digit-container"><span class="digit-strip" id="h2"><span>0123456789</span></span></span>
            <span class="time-colon">:</span>
            <span class="digit-container"><span class="digit-strip" id="m1"><span>012345</span></span></span>
            <span class="digit-container"><span class="digit-strip" id="m2"><span>0123456789</span></span></span>
            <span class="time-colon">:</span>
            <span class="digit-container"><span class="digit-strip" id="s1"><span>012345</span></span></span>
            <span class="digit-container"><span class="digit-strip" id="s2"><span>0123456789</span></span></span>
        </div>
        <div class="date" id="date"></div>

        <div class="search-container">
            <form id="searchForm" action="https://www.google.com/search" method="get" target="_blank" class="search-form">
                <select id="engine" class="search-select" onchange="updateEngine()">
                    <option value="google">Google</option>
                    <option value="yahoo">Yahoo!</option>
                </select>
                <input type="text" name="q" id="query" class="search-input" placeholder="検索キーワードを入力" autocomplete="off" required>
                <button type="submit" class="search-submit-btn">➔</button>
            </form>
            <div id="suggestionBox"></div>
        </div>
    </div>

    <script>
        // 時計ロジック
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            
            const setDigit = (id, val) => {
                const element = document.getElementById(id);
                if(element) element.style.transform = `translateY(-${val * 5}rem)`;
            };

            setDigit('h1', h[0]); setDigit('h2', h[1]);
            setDigit('m1', m[0]); setDigit('m2', m[1]);
            setDigit('s1', s[0]); setDigit('s2', s[1]);
            
            document.getElementById('date').textContent = now.toLocaleDateString('ja-JP', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 検索窓の予測変換ロジック
        const queryInput = document.getElementById('query');
        const suggestionBox = document.getElementById('suggestionBox');

        queryInput.addEventListener('input', async () => {
            const val = queryInput.value;
            if (val.length < 1) { 
                suggestionBox.style.display = 'none'; 
                return; 
            }

            try {
                const url = `https://suggestqueries.google.com/complete/search?client=chrome&q=${encodeURIComponent(val)}`;
                const response = await fetch(url);
                const data = await response.json();
                const suggestions = data[1];

                suggestionBox.innerHTML = '';
                if (suggestions.length > 0) {
                    suggestionBox.style.display = 'block';
                    suggestions.slice(0, 6).forEach(s => {
                        const div = document.createElement('div');
                        div.className = 'suggestion-item';
                        div.textContent = s;
                        div.onclick = () => {
                            queryInput.value = s;
                            document.getElementById('searchForm').submit();
                        };
                        suggestionBox.appendChild(div);
                    });
                } else {
                    suggestionBox.style.display = 'none';
                }
            } catch (e) {
                console.error("予測変換の取得に失敗しました", e);
            }
        });

        // 検索窓以外をクリックしたら閉じる
        document.addEventListener('click', (e) => {
            if (!queryInput.contains(e.target)) suggestionBox.style.display = 'none';
        });

        // 検索エンジン切り替え
        function updateEngine() {
            const engine = document.getElementById('engine').value;
            const form = document.getElementById('searchForm');
            const query = document.getElementById('query');
            form.action = (engine === 'yahoo') ? "https://search.yahoo.co.jp/search" : "https://www.google.com/search";
            query.name = (engine === 'yahoo') ? "p" : "q";
        }
    </script>
</body>
</html>
