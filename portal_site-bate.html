<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポータルサイト（β版）</title>
    <style>
        /* スムーズスクロールを有効化 */
        html {
            scroll-behavior: smooth;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        /* カスタムスクロールバーのデザイン設定 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.3);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(56, 189, 248, 0.3);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: background 0.2s;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(56, 189, 248, 0.6);
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 40px 20px;
            background-repeat: no-repeat;
            background-position: center center;
            background-attachment: fixed;
            background-size: cover;
            transition: background 0.5s ease;
            -webkit-overflow-scrolling: touch; /* モバイルでの慣性スクロール */
        }

        /* ヘッダーエリア */
        .portal-header {
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 0 4px 12px rgba(0, 0, 0, 0.7);
            position: relative;
            width: 100%;
            max-width: 1200px;
        }

        /* 時計エリア */
        .clock-container {
            text-align: center;
            margin-bottom: 15px;
        }

        /* アニメーション対応の時計表示スタイル */
        .time {
            font-size: 4.2rem;
            font-weight: bold;
            letter-spacing: 2px;
            color: #ffffff;
            display: flex;
            justify-content: center;
            gap: 2px;
        }

        /* 各桁（数字1文字分）の表示エリア */
        .digit-container {
            display: inline-block;
            height: 5rem; /* 文字の高さに固定 */
            overflow: hidden; /* はみ出た数字を隠す */
            position: relative;
            width: 2.8rem; /* 文字の横幅を固定してガタつきを防ぐ */
            text-align: center;
        }

        /* 縦に並ぶ数字の帯（0〜9） */
        .digit-strip {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); /* スムーズで美しい加減速 */
            display: flex;
            flex-direction: column;
        }

        .digit-strip span {
            display: inline-block;
            height: 5rem;
            line-height: 5rem;
        }

        /* コロン（:）用スタイル（点滅アニメーションを削除しました） */
        .time-colon {
            display: inline-block;
            line-height: 4.6rem;
            width: 1.5rem;
            text-align: center;
        }

        .date {
            font-size: 1.25rem;
            color: #cbd5e1;
            margin-top: 5px;
            font-weight: 500;
        }

        /* 直通検索バーのスタイル（すりガラス・サイバーネオン仕様） */
        .search-container {
            width: 100%;
            max-width: 650px;
            margin: 0 auto 25px auto;
            position: relative;
        }

        .search-form {
            display: flex;
            align-items: center;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(56, 189, 248, 0.4);
            border-radius: 50px;
            padding: 4px 6px 4px 18px;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.15), inset 0 0 10px rgba(56, 189, 248, 0.05);
            transition: 0.3s ease;
        }

        .search-form:focus-within {
            border-color: #38bdf8;
            box-shadow: 0 0 25px rgba(56, 189, 248, 0.35), inset 0 0 15px rgba(56, 189, 248, 0.1);
            transform: scale(1.01);
        }

        .search-select-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            margin-right: 12px;
        }

        .search-select {
            background: transparent;
            color: #38bdf8;
            border: none;
            outline: none;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            padding-right: 18px;
            appearance: none;
            -webkit-appearance: none;
        }

        .search-select-wrapper::after {
            content: "▼";
            font-size: 0.65rem;
            color: #38bdf8;
            position: absolute;
            right: 2px;
            pointer-events: none;
        }

        .search-select option {
            background: #0f172a;
            color: #ffffff;
        }

        .search-divider {
            width: 1px;
            height: 22px;
            background: rgba(255, 255, 255, 0.15);
            margin-right: 15px;
        }

        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #ffffff;
            font-size: 1.05rem;
            padding: 8px 0;
        }

        .search-input::placeholder {
            color: #94a3b8;
        }

        .search-submit-btn {
            background: #38bdf8;
            color: #0f172a;
            border: none;
            border-radius: 50%;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s ease;
            font-weight: bold;
        }

        .search-submit-btn:hover {
            background: #0ea5e9;
            transform: scale(1.05);
        }

        /* メイングリッド (2カラム構成) */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1.4fr 0.6fr;
            gap: 25px;
            width: 100%;
            max-width: 1250px;
            align-items: start;
        }

        /* 各カードの共通スタイル（すりガラス効果） */
        .card {
            background: rgba(15, 23, 42, 0.5); 
            backdrop-filter: blur(16px);       
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 22px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            margin-bottom: 22px;
        }

        .card h2 {
            font-size: 1.15rem;
            margin-bottom: 15px;
            color: #38bdf8;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 25px;
        }

        /* ライフ情報専用のカードスタイル（レイアウト崩れ対策） */
        .life-info-card {
            display: flex;
            flex-direction: column;
            gap: 15px; /* 要素同士の縦の間隔をしっかりと固定 */
        }

        /* カテゴリーカード（左カラム） */
        .category-card {
            background: rgba(15, 23, 42, 0.5); 
            backdrop-filter: blur(16px);       
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            margin-bottom: 25px;
        }

        .category-card-header {
            font-size: 1.3rem;
            font-weight: bold;
            color: #38bdf8;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* 管理用ヘッダーカード */
        .admin-card {
            background: rgba(15, 23, 42, 0.35);
            border: 1px dashed rgba(255, 255, 255, 0.15);
            margin-top: 20px;
        }

        /* 各種ボタン */
        .edit-btn {
            background: #38bdf8;
            color: #0f172a;
            padding: 6px 16px;
            border-radius: 6px;
            font-size: 0.95rem;
            cursor: pointer;
            font-weight: bold;
            border: none;
            transition: 0.2s;
        }

        .edit-btn:hover {
            background: #0ea5e9;
        }

        .category-del-btn {
            display: none;
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: bold;
        }

        /* リンク（ショートカット） */
        .shortcut-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .shortcut-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        .shortcut-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px;
            background: rgba(255, 255, 255, 0.07);
            border-radius: 8px;
            color: #fff;
            text-decoration: none;
            transition: 0.2s;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 1.05rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
        }

        .shortcut-item:hover {
            background: rgba(56, 189, 248, 0.25);
            transform: translateY(-2px);
        }

        .shortcut-icon {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            object-fit: contain;
        }

        /* 削除ボタン */
        .delete-link-btn {
            display: none;
            position: absolute;
            right: 12px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            font-size: 0.9rem;
            cursor: pointer;
            line-height: 24px;
            text-align: center;
        }

        /* ライフ情報：お天気パネル */
        .weather-panel-detailed {
            background: rgba(56, 189, 248, 0.08);
            border: 1px solid rgba(56, 189, 248, 0.25);
            border-radius: 12px;
            padding: 16px;
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: 0.2s ease;
            box-sizing: border-box;
        }

        .weather-panel-detailed:hover {
            background: rgba(56, 189, 248, 0.15);
            border-color: rgba(56, 189, 248, 0.4);
            transform: translateY(-2px);
        }

        .weather-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .weather-main {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .weather-big-icon {
            font-size: 2.5rem;
            line-height: 1;
        }

        .weather-temp-now {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .weather-grid-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            font-size: 0.8rem;
            background: rgba(15, 23, 42, 0.4);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .weather-grid-item {
            display: flex;
            justify-content: space-between;
            color: #cbd5e1;
        }

        .weather-grid-item span {
            font-weight: bold;
            color: #ffffff;
            margin-left: 5px;
        }

        /* ニュースリスト */
        .news-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 5px;
        }

        .news-item {
            display: block;
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            color: #e2e8f0;
            text-decoration: none;
            font-size: 0.82rem;
            transition: 0.2s;
            border-left: 3px solid #38bdf8;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.2;
        }

        .news-item:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            transform: translateX(4px);
        }

        /* 編集フォーム */
        .edit-form {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: rgba(15, 23, 42, 0.95);
            border-radius: 10px;
            border: 1px dashed rgba(255, 255, 255, 0.2);
            flex-direction: column;
            gap: 18px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 1rem;
            color: #38bdf8;
            font-weight: bold;
        }

        .edit-form input, .edit-form select {
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #38bdf8;
            background: #1e293b;
            color: #ffffff;
            font-size: 1rem;
            outline: none;
        }

        .edit-form select option {
            background: #1e293b;
            color: #ffffff;
        }

        /* トレンドリンクスタイル */
        .trend-card-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 15px;
            border-radius: 10px;
            color: #fff;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: bold;
            transition: 0.2s;
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
        }

        .trend-card-link:hover {
            background: rgba(56, 189, 248, 0.25);
            transform: translateY(-2px);
        }

        /* マーケットテーブル */
        .market-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 5px;
        }

        .market-table th, .market-table td {
            padding: 8px 4px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            vertical-align: middle;
        }

        .market-table th {
            color: #94a3b8;
            font-weight: bold;
            font-size: 0.75rem;
        }

        .market-table td {
            font-size: 0.85rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
        }

        .clickable-row {
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        .clickable-row:hover {
            background-color: rgba(255, 255, 255, 0.08);
        }

        .clickable-row:active {
            transform: scale(0.99);
        }

        .market-sparkline {
            width: 50px;
            height: 20px;
            vertical-align: middle;
        }

        .price-down {
            color: #ef4444;
            font-weight: bold;
        }

        .price-up {
            color: #10b981;
            font-weight: bold;
        }

        .market-date {
            font-size: 0.72rem;
            color: #94a3b8;
            text-align: right;
            margin-top: 8px;
        }

        @media (max-width: 1024px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="portal-header">
        <div class="clock-container">
            <div class="time" id="clock">
                <span class="digit-container"><span class="digit-strip" id="h1"><span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span></span></span>
                <span class="digit-container"><span class="digit-strip" id="h2"><span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span></span></span>
                
                <span class="time-colon">:</span>
                
                <span class="digit-container"><span class="digit-strip" id="m1"><span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span></span></span>
                <span class="digit-container"><span class="digit-strip" id="m2"><span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span></span></span>
                
                <span class="time-colon">:</span>
                
                <span class="digit-container"><span class="digit-strip" id="s1"><span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span></span></span>
                <span class="digit-container"><span class="digit-strip" id="s2"><span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span></span></span>
            </div>
            <div class="date" id="date">2026年7月15日 (水)</div>
        </div>

        <div class="search-container">
            <form id="portalSearchForm" action="https://www.google.com/search" method="get" target="_blank" class="search-form" onsubmit="return executeSearch()">
                <div class="search-select-wrapper">
                    <select id="searchEngineSelect" class="search-select" onchange="updateSearchEngine()">
                        <option value="google">Google</option>
                        <option value="yahoo">Yahoo!</option>
                        <option value="youtube">YouTube</option>
                        <option value="bing">Bing</option>
                    </select>
                </div>
                <div class="search-divider"></div>
                <input type="text" id="portalSearchInput" name="q" class="search-input" placeholder="検索キーワードを入力..." required autocomplete="off">
                <button type="submit" class="search-submit-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0f172a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </button>
            </form>
        </div>
    </div>

    <div class="dashboard-grid">
        
        <div class="left-column">
            
            <div id="categoriesContainer">
                </div>

            <div class="card admin-card" style="padding: 18px 25px;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span style="font-weight: bold; color: #94a3b8; font-size: 0.95rem;">🛠 ポータルシステム設定</span>
                    <button onclick="toggleEditMode()" id="editModeBtn" class="edit-btn">編集モード</button>
                </div>

                <div id="editForm" class="edit-form">
                    <div class="form-group" style="margin-bottom:5px; border-bottom:1px dashed rgba(255,255,255,0.2); padding-bottom:15px;">
                        <label>🖼 壁紙画像を変更（画像URLを入力）</label>
                        <div style="display:flex; gap:10px;">
                            <input type="text" id="bgUrlInput" placeholder="https://example.com/image.jpg" style="flex:1;">
                            <button onclick="updateBackground()" class="edit-btn">適用</button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>【1】新しいカテゴリーを追加</label>
                        <div style="display:flex; gap:10px;">
                            <input type="text" id="newCatName" placeholder="例: ニュース" style="flex:1;">
                            <button onclick="addCategory()" class="edit-btn">作成</button>
                        </div>
                    </div>
                    
                    <div class="form-group" style="margin-top:5px; border-top:1px dashed rgba(255,255,255,0.2); padding-top:20px;">
                        <label>【2】サイトを追加</label>
                        <select id="linkCategorySelect">
                            </select>
                        <input type="text" id="linkName" placeholder="サイト名（例: Google）" style="margin-top:8px;">
                        <input type="text" id="linkUrl" placeholder="URL（例: google.com）" style="margin-top:8px;">
                        <button onclick="addLink()" class="edit-btn" style="width: 100%; margin-top:12px;">サイトを登録</button>
                    </div>
                </div>
            </div>

        </div>

        <div class="right-column">
            
            <div class="card life-info-card">
                <h2>☀️ 本日のライフ情報</h2>
                
                <a href="https://weather.yahoo.co.jp/weather/28/6310.html" target="_blank" class="weather-panel-detailed">
                    <div class="weather-header">
                        <span style="font-weight: bold; font-size: 0.9rem; color: #38bdf8;">📍 兵庫県川西市の天気</span>
                        <span style="font-size: 0.7rem; color: #94a3b8; background: rgba(255,255,255,0.1); padding: 1px 4px; border-radius: 4px;">詳細</span>
                    </div>
                    
                    <div class="weather-main">
                        <span class="weather-big-icon" id="weatherIcon">☀️</span>
                        <div>
                            <div class="weather-temp-now" id="weatherText">晴れのち曇</div>
                            <div style="font-size: 0.78rem; color: #cbd5e1; margin-top: 1px;">
                                気温: <span style="color:#ef4444; font-weight:bold;">28℃ / 19℃</span>
                            </div>
                        </div>
                    </div>

                    <div class="weather-grid-details">
                        <div class="weather-grid-item">降水(午前): <span>10%</span></div>
                        <div class="weather-grid-item">降水(午後): <span>20%</span></div>
                        <div class="weather-grid-item">湿度: <span>55%</span></div>
                        <div class="weather-grid-item">風速: <span>北西 2m/s</span></div>
                    </div>
                </a>

                <div class="news-list" id="newsFeed">
                    </div>
            </div>

            <div class="card">
                <h2>🌐 トレンドキーワード</h2>
                <p style="font-size: 0.8rem; color: #cbd5e1; margin-bottom: 12px; line-height: 1.4;">今、世の中で一番検索されているワードを瞬時にチェック。</p>
                <a href="https://trends.google.co.jp/trends/trendingsearches/daily?geo=JP" target="_blank" class="trend-card-link">
                    📈 急上昇ワードを開く
                    <span>➔</span>
                </a>
            </div>

            <div class="card">
                <h2>📈 マーケット情報</h2>
                <table class="market-table">
                    <thead>
                        <tr>
                            <th>指標</th>
                            <th>現在値</th>
                            <th style="width: 55px; text-align: center;">推移</th>
                            <th style="text-align: right; padding-right: 4px;">比率</th>
                        </tr>
                    </thead>
                    <tbody id="market-table-body">
                        </tbody>
                </table>

            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');

            function setDigit(id, value) {
                const strip = document.getElementById(id);
                if (strip) {

                    strip.style.transform = `translateY(-${yOffset}rem)`;
                }
            }

            setDigit('h1', parseInt(hours[0]));
            setDigit('h2', parseInt(hours[1]));
            setDigit('m1', parseInt(minutes[0]));
            setDigit('m2', parseInt(minutes[1]));
            setDigit('s1', parseInt(seconds[0]));

            const date = now.getDate();

        function drawSparkline(canvasId, dataPoints, strokeColor) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const width = canvas.width;
            const height = canvas.height;

            const dpr = window.devicePixelRatio || 1;
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            ctx.scale(dpr, dpr);

            ctx.clearRect(0, 0, width, height);

            const min = Math.min(...dataPoints);
            const max = Math.max(...dataPoints);
            const range = max - min === 0 ? 1 : max - min;

            ctx.beginPath();
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = strokeColor;

            dataPoints.forEach((val, i) => {
                const x = (i / (dataPoints.length - 1)) * (width - 4) + 2;
                const y = height - ((val - min) / range) * (height - 4) - 2;
                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            });
            ctx.stroke();

            ctx.lineTo((width - 4) + 2, height);
            ctx.lineTo(2, height);
            ctx.closePath();
            ctx.fillStyle = strokeColor === '#ef4444' ? 'rgba(239, 68, 68, 0.12)' : 'rgba(16, 185, 129, 0.12)';
            ctx.fill();
        }

        function renderMarketTable() {
            const tbody = document.getElementById('market-table-body');

                const isUp = item.change >= 0;
                const changeClass = isUp ? 'price-up' : 'price-down';
                const prefix = isUp ? '+' : '';
                
                const formattedVal = item.currentVal.toLocaleString(undefined, { minimumFractionDigits: item.decimals, maximumFractionDigits: item.decimals });
                const formattedChange = item.change.toLocaleString(undefined, { minimumFractionDigits: item.decimals, maximumFractionDigits: item.decimals });

                tr.innerHTML = `
                    <td><strong>${item.name}</strong></td>
                    <td>${formattedVal}</td>
                    <td style="text-align: center;">

                    </td>
                    <td class="${changeClass}" style="text-align: right; padding-right: 4px;">
                        ${prefix}${formattedChange}
                    </td>
                `;
                tbody.appendChild(tr);

                const strokeColor = isUp ? '#10b981' : '#ef4444';
                drawSparkline(`canvas-${key}`, item.history, strokeColor);
            });

            const now = new Date();
            const formatTime = `${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')} 更新`;
            document.getElementById('market-update-time').textContent = formatTime;
        }

        function updateMarketData() {
            Object.keys(marketData).forEach(key => {
                const item = marketData[key];
                const changePercent = (Math.random() - 0.5) * 0.0002; 
                const delta = item.currentVal * changePercent;

                item.currentVal += delta;
                item.change += delta;
                item.history[item.history.length - 1] = item.currentVal;
            });
            renderMarketTable();

        function renderDashboard() {

        function toggleEditMode() {
            isEditMode = !isEditMode;

        function applyEditModeStyles() {
            const catDelBtns = document.querySelectorAll('.category-del-btn');
            catDelBtns.forEach(b => b.style.display = isEditMode ? 'block' : 'none');

            Object.keys(dashboardData).forEach(catName => {
                dashboardData[catName].forEach((_, index) => {
                    const delBtn = document.getElementById(`del-${catName}-${index}`);
                    const linkItem = document.getElementById(`link-${catName}-${index}`);
                    if (delBtn && linkItem) {
                        if (isEditMode) {
                            delBtn.style.display = "block";
                            linkItem.removeAttribute('href');
                            linkItem.style.cursor = "default";
                        } else {
                            delBtn.style.display = "none";
                            linkItem.setAttribute('href', dashboardData[catName][index].url);
                            linkItem.style.cursor = "pointer";
                        }
                    }
                });
            });
        }

        function addCategory() {
            const input = document.getElementById('newCatName');
            const name = input.value.trim();
            if (name && !dashboardData[name]) {
                dashboardData[name] = [];
                saveData();
                input.value = '';
                renderDashboard();
            }
        }

        function deleteCategory(catName) {
            if (confirm(`カテゴリー「${catName}」と中身のリンクをすべて削除しますか？`)) {
                delete dashboardData[catName];
                saveData();
                renderDashboard();
            }
        }

        function addLink() {
            const catSelect = document.getElementById('linkCategorySelect');
            const nameInput = document.getElementById('linkName');
            const urlInput = document.getElementById('linkUrl');

            const cat = catSelect.value;
            let name = nameInput.value.trim();
            let url = urlInput.value.trim();

            if (!cat || !name || !url) {
                alert('すべての項目を入力・選択してください。');
                return;
            }
            if (!/^https?:\/\//i.test(url)) url = 'https://' + url;

            dashboardData[cat].push({ name: name, url: url });
            saveData();

            nameInput.value = '';
            urlInput.value = '';
            renderDashboard();
        }

        function deleteLink(catName, index) {
            dashboardData[catName].splice(index, 1);
            saveData();
            renderDashboard();
        }
